services:
  postgres:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: arena
      POSTGRES_USER: arena
      POSTGRES_PASSWORD: localdev
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      RUST_LOG: arena_server=debug,tower_http=debug
      FRONTEND_URL: http://localhost:3001
      DATABASE_URL: postgres://arena:localdev@postgres:5432/arena
    depends_on:
      - postgres

volumes:
  pgdata:
